apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops-sentiment
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: sentiment-api
        metrics_path: /metrics
        static_configs:
          - targets: ["sentiment-api:8000"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops-sentiment
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops-sentiment
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
