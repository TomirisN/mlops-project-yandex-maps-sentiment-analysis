apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mlops-sentiment

resources:
  - namespace.yaml
  - configmap.yaml
  - mlflow-deployment.yaml
  - api-deployment.yaml
  - api-service.yaml
  - prometheus-deployment.yaml
  - grafana-deployment.yaml
  - ingress.yaml

configMapGenerator:
  - name: grafana-dashboard
    files:
      - mlops-sentiment.json=../docker/grafana/dashboards/mlops-sentiment.json

commonLabels:
  app.kubernetes.io/part-of: mlops-sentiment
