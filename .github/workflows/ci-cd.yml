name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_MLFLOW: ghcr.io/${{ github.repository }}/mlflow

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install -r requirements-ci.txt

      - name: Run tests
        env:
          USE_MLFLOW: "false"
        run: pytest tests/ -v

  lint:
    name: Lint (app + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8==7.1.1 black==24.10.0

      - run: flake8 app/ tests/
      - run: black --check app/ tests/

  docker:
    name: Docker build (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: mlops-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish images (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, lint, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build and push MLflow
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.mlflow
          push: true
          tags: |
            ${{ env.IMAGE_MLFLOW }}:latest
            ${{ env.IMAGE_MLFLOW }}:${{ github.sha }}

  deploy:
    name: Deploy (main → Kubernetes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to cluster (optional)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            mkdir -p ~/.kube
            echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/mlflow-deployment.yaml
            kubectl apply -f k8s/api-deployment.yaml
            kubectl apply -f k8s/api-service.yaml
            kubectl apply -f k8s/prometheus-deployment.yaml
            kubectl apply -f k8s/grafana-deployment.yaml
            kubectl apply -f k8s/ingress.yaml
            kubectl rollout status deployment/sentiment-api -n mlops-sentiment --timeout=120s
            echo "Deployed to Kubernetes"
          else
            echo "KUBE_CONFIG secret not set — skip remote deploy."
            echo "Use scripts/deploy_minikube.ps1 for local Minikube deploy."
          fi
