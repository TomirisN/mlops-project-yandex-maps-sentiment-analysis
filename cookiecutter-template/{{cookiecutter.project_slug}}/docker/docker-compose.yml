name: {{ cookiecutter.project_slug }}

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: {{ cookiecutter.mlflow_model_name }}
    depends_on:
      - mlflow
